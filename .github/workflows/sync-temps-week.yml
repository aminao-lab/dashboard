name: 📅 Sync Temps Semaine
on:
  schedule:
    - cron: "0 2 * * 1" # Lundi 2h (début semaine)
  workflow_dispatch:

concurrency:
  group: sync-temps-semaine-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Sécurité

    strategy:
      fail-fast: false
      matrix:
        job_index: [0, 1, 2, 3, 4]

    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 PHP 8.2 + Extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: curl, json

      - name: Start Timer
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: 🔄 Sync Temps Week (Job ${{ matrix.job_index }} /4)
        working-directory: ./refonte-dashboard/logs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          LW_API_TOKEN: ${{ secrets.LW_API_TOKEN }}
          JOB_INDEX: ${{ matrix.job_index }}
          TOTAL_JOBS: 4
        run: |
          cd refonte-dashboard/logs
          php sync_temps_week.php

      - name: End Timer
        if: always()
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "⏱️ Durée du job:${{matrix.job_index}} : $DURATION sec"
      - name: Upload logs ( en cas d'erreur )
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sync-logs-job-${{ matrix.job_index }}
          path: ./refonte-dashboard/logs/
          retention-days: 7

  # Job de vérification final
  verify:
    needs: sync
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 PHP 8.2 + Extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Vérification finale
        working-directory: ./refonte-dashboard/logs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "📊 Total lignes temps_week: $(php -r 'require \"config/supabase.php\"; echo count((new SupabaseClient())->selectAll(\"temps_week\"));')"
