name: ⚡ Sync Daily Activity + Progression
on:
  schedule:
    - cron: "20 1 * * *" # 1h00 CET (deltas + badges)
  workflow_dispatch:

concurrency:
  group: sync-daily-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 100

    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: curl, json

      - name: ⚡ Daily Activity
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          LW_BASE_URL: ${{ secrets.LW_BASE_URL }}
          LW_API_TOKEN: ${{ secrets.LW_API_TOKEN }}
          LW_CLIENT_ID: ${{ secrets.LW_CLIENT_ID }}
        run: cd refonte-dashboard/sync && php sync_daily_activity.php

      - name: 🏅 Progression (optionnel)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          LW_BASE_URL: ${{ secrets.LW_BASE_URL }}
          LW_API_TOKEN: ${{ secrets.LW_API_TOKEN }}
          LW_CLIENT_ID: ${{ secrets.LW_CLIENT_ID }}
        run: cd refonte-dashboard/sync && php sync_progression.php || echo "🏅 Progression ignorée"

      - name: 📊 Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-daily-logs
          path: refonte-dashboard/logs/
          retention-days: 5
