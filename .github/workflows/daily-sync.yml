name: Daily Sync (daily_activity)

on:
  schedule:
    # Tous les jours à 23:05 UTC (= 00:05 Paris hiver / 01:05 été)
    - cron: "05 23 * * *"
  workflow_dispatch: {} # Bouton manuel "Run workflow"

jobs:
  sync:
    runs-on: ubuntu-latest # Machine Linux gratuite de GitHub

    steps:
      # Étape 1 : Télécharger le code
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Debug tree
        run: |
          pwd
          ls -la
          echo "---- find sync_daily_activity.php ----"
          find . -maxdepth 6 -type f -name "sync_daily_activity.php" -print
          echo "---- find sync dir ----"
          find . -maxdepth 5 -type d -name "sync" -print
        
      # Étape 2 : Installer PHP 8.2
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      # Étape 3 : Lancer le script avec les secrets
      - name: Run daily activity sync
        env: # Injecte les secrets dans les variables d'environnement
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          LW_BASE_URL: ${{ secrets.LW_BASE_URL }}
          LW_API_TOKEN: ${{ secrets.LW_API_TOKEN }}
          LW_CLIENT_ID: ${{ secrets.LW_CLIENT_ID }}
          APP_SESSION_SECRET: ${{ secrets.APP_SESSION_SECRET }}
        run: |
          php -v  # Juste pour vérifier que PHP marche
          php refonte-dashboard/sync/sync_daily_activity.php

