name: 📊 Sync Temps Niveau
on:
  workflow_dispatch:
  schedule:
    - cron: "45 0 * * *"
  workflow_call:

concurrency:
  group: sync-temps-niveau-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 🔄 Sync CRITIQUE Temps Niveau
        working-directory: ./refonte-dashboard/sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          LW_API_TOKEN: ${{ secrets.LW_API_TOKEN }}
        run: |
          echo "📊 Avant: $(php -r 'require \"config/supabase.php\"; echo count((new SupabaseClient())->selectAll(\"temps_niveau\"));')"
          php sync_temps_niveau.php
          echo "📊 Après: $(php -r 'require \"config/supabase.php\"; echo count((new SupabaseClient())->selectAll(\"temps_niveau\"));')"
