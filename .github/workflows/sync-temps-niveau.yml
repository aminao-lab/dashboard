name: 📊 Sync Temps Niveau
on:
  workflow_dispatch: # Permet de déclencher manuellement depuis l'onglet "Actions" de GitHub
  schedule:
    - cron: "45 0 * * *" # 00h45 CET (cumuls LW)
  workflow_call: # Réutilisable

concurrency:
  group: sync-temps-niveau-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # 1654 users = 20min

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐘 PHP 8.2 + extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: curl,mbstring,xml,posix

      - name: 🔄 Sync CRITIQUE Temps Niveau
        working-directory: ./sync # ← FIX #1 : répertoire de travail
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          LW_API_TOKEN: ${{ secrets.LW_API_TOKEN }}
        run: |
          cd sync
          echo "📊 Temps niveau avant: $(php -r 'require \"../config/supabase.php\"; echo count((new SupabaseClient())->selectAll(\"temps_niveau\"));')"
          php sync_temps_niveau.php
          echo "📊 Temps niveau après: $(php -r 'require \"config/supabase.php\"; echo count((new SupabaseClient())->selectAll(\"temps_niveau\"));')"
