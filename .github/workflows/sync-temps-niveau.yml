name: 📊 Sync Temps Niveau

on:
  workflow_dispatch:
  schedule:
    - cron: "25 0 * * *"
  workflow_call:

concurrency:
  group: sync-temps-niveau-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 100

    strategy:
      fail-fast: false
      matrix:
        job_index: [0, 1, 2, 3, 4, 5]
    env:
      TOTAL_JOBS: 6

    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: curl, json

      - name: ⏱️ Start Timer
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: 🔄 Sync Temps Niveau (Job ${{ matrix.job_index }}/4)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          LW_API_TOKEN: ${{ secrets.LW_API_TOKEN }}
          JOB_INDEX: ${{ matrix.job_index }}
          TOTAL_JOBS: 4
        run: |
          cd refonte-dashboard/sync
          php sync_temps_niveau.php

      - name: ⏱️ End Timer
        if: always()
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "⏱️ Durée Job ${{ matrix.job_index }}: ${DURATION}s"

      - name: 📊 Upload logs (en cas d'erreur)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sync-logs-job-${{ matrix.job_index }}
          path: refonte-dashboard/logs/
          if-no-files-found: ignore
          retention-days: 7

  # Job de vérification final
  verify:
    needs: sync
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: 📊 Statistiques finales
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd refonte-dashboard/sync
          TOTAL=$(php -r "require '../config/supabase.php'; echo count((new SupabaseClient())->selectAll('temps_niveau'));")
          echo "📊 Total lignes temps_niveau: ${TOTAL}"

      - name: ✅ Résumé
        run: echo "🎉 Synchronisation terminée !"
