name: 📊 Sync Temps Niveau
on:
  workflow_dispatch:
  schedule:
    - cron: "45 0 * * *"
  workflow_call:

concurrency:
  group: sync-temps-niveau-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 🔍 DEBUG - VÉRIFIER ARBORESCENCE
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          echo "=== PWD ==="
          pwd
          echo "=== LS RACINE ==="
          ls -la
          echo "=== TROUVER sync_temps_niveau.php ==="
          find . -name "sync_temps_niveau.php" -type f
          echo "=== TROUVER supabase.php ==="
          find . -name "supabase.php" -type f
